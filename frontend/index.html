<!DOCTYPE html>

<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI 学习平台</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    <script src="https://unpkg.com/vue-router@4/dist/vue-router.global.prod.js"></script>
    <style>
        /* ========== 颜色变量 ========== */
        :root {
            --bg: #000000; --bg-card: #111111; --bg-input: #1a1a1a; --bg-hover: #252525;
            --border: #2a2a2a; --border-light: #1a1a1a;
            --text: #e5e5e5; --text-secondary: #888888; --text-muted: #666666;
            --primary: #22d3ee; --primary-hover: #06b6d4; --primary-soft: rgba(34,211,238,0.12);
            --danger: #ef4444; --danger-hover: #dc2626; --success: #4ade80;
            --code-bg: #1e1e1e; --pre-bg: #0a0a0a;
            --btn-outline-text: #888888; --btn-outline-border: #333333;
            --shadow: none; --modal-overlay: rgba(0,0,0,0.7);
            --welcome-chip-bg: #1a1a1a; --welcome-chip-border: #2a2a2a; --welcome-chip-text: #67e8f9; --welcome-chip-hover-bg: #0d3b4f;
        }
        /* ========== 全局 ========== */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', 'PingFang SC', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
        .btn { padding: 10px 24px; border: none; border-radius: 8px; font-size: 0.9rem; cursor: pointer; font-weight: 600; transition: all 0.15s; }
        .btn-primary { background: #22d3ee; color: #000; }
        .btn-primary:hover { background: #06b6d4; }
        .btn-danger { background: #ef4444; color: white; }
        .btn-danger:hover { background: #dc2626; }
        .btn-outline { background: transparent; color: var(--btn-outline-text); border: 1px solid var(--btn-outline-border); }
        .btn-outline:hover { border-color: #22d3ee; color: var(--text); }
        .btn-sm { padding: 6px 14px; font-size: 0.8rem; }

        /* ========== 欢迎页 ========== */
        .welcome { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; gap: 24px; text-align: center; padding: 20px; }
        .welcome h1 { font-size: 3rem; background: linear-gradient(135deg, #22d3ee, #2dd4bf, #5eead4); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
        .welcome p { color: var(--text-secondary); font-size: 1.1rem; max-width: 500px; line-height: 1.8; }

        /* ========== 登录/注册页 ========== */
        .auth-page { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; gap: 16px; }
        .auth-page .card { background: var(--bg-card); border-radius: 16px; padding: 40px; width: 380px; border: 1px solid var(--border); box-shadow: var(--shadow); }
        .auth-page h2 { text-align: center; margin-bottom: 24px; font-size: 1.5rem; }
        .auth-page .tabs { display: flex; margin-bottom: 24px; border-radius: 8px; overflow: hidden; border: 1px solid var(--border); }
        .auth-page .tab { flex: 1; text-align: center; padding: 10px; cursor: pointer; font-size: 0.9rem; color: var(--text-secondary); background: transparent; transition: all 0.15s; }
        .auth-page .tab.active { background: #22d3ee; color: #000; }
        .auth-page label { display: block; font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 4px; }
        .auth-page input { width: 100%; padding: 10px 14px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg-input); color: var(--text); font-size: 0.95rem; margin-bottom: 12px; outline: none; }
        .auth-page input:focus { border-color: #22d3ee; }
        .auth-page .btn { width: 100%; margin-top: 8px; }
        .auth-page .error { color: #f87171; font-size: 0.85rem; text-align: center; min-height: 20px; }
        .auth-page .success { color: #4ade80; font-size: 0.85rem; text-align: center; min-height: 20px; }
        .auth-page .back { text-align: center; margin-top: 10px; }
        .auth-page .back a { color: #22d3ee; text-decoration: none; font-size: 0.85rem; cursor: pointer; }

        /* ========== 主布局 ========== */
        .layout { display: flex; height: 100vh; }
        .sidebar { width: 260px; background: var(--bg-card); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; }
        .sidebar .logo { font-size: 1.3rem; font-weight: 700; padding: 20px 20px 16px; background: linear-gradient(135deg, #22d3ee, #5eead4); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; flex-shrink: 0; }
        .sidebar .menu-item { padding: 10px 20px; cursor: pointer; display: flex; align-items: center; gap: 10px; color: var(--text-secondary); font-size: 0.9rem; transition: all 0.15s; flex-shrink: 0; }
        .sidebar .menu-item:hover, .sidebar .menu-item.active { color: var(--text); background: var(--bg-hover); }
        .sidebar .session-section { flex: 1; display: flex; flex-direction: column; overflow: hidden; margin-top: 8px; border-top: 1px solid var(--border-light); padding-top: 10px; }
        .sidebar .session-header { display: flex; align-items: center; justify-content: space-between; padding: 4px 20px 10px; flex-shrink: 0; }
        .sidebar .session-header span { font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
        .sidebar .session-header .new-btn { background: none; border: 1px solid var(--btn-outline-border); color: var(--text-secondary); border-radius: 6px; padding: 3px 10px; font-size: 0.75rem; cursor: pointer; transition: all 0.15s; }
        .sidebar .session-header .new-btn:hover { border-color: #22d3ee; color: var(--text); }
        .sidebar .session-list { flex: 1; overflow-y: auto; padding: 0 8px; }
        .sidebar .session-item { padding: 8px 12px; border-radius: 8px; cursor: pointer; font-size: 0.82rem; color: var(--text-secondary); display: flex; align-items: center; gap: 8px; transition: all 0.1s; margin-bottom: 2px; }
        .sidebar .session-item:hover { background: var(--bg-hover); color: var(--text); }
        .sidebar .session-item.active { background: var(--primary-soft); color: #22d3ee; }
        .sidebar .session-item .s-title { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-size: 0.8rem; }
        .sidebar .session-item .s-del { opacity: 0; font-size: 0.9rem; color: var(--danger); transition: opacity 0.15s; flex-shrink: 0; line-height: 1; }
        .sidebar .session-item:hover .s-del { opacity: 1; }
        .sidebar .user-info { padding: 14px 20px; border-top: 1px solid var(--border); font-size: 0.85rem; color: var(--text-secondary); display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
        .sidebar .logout-btn { margin-left: auto; color: var(--danger); cursor: pointer; font-size: 0.8rem; }
        .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: var(--bg); }

        /* ========== 聊天界面 ========== */
        .chat-area { display: flex; flex-direction: column; height: 100%; }
        .chat-header { padding: 14px 24px; border-bottom: 1px solid var(--border-light); font-weight: 600; display: flex; align-items: center; gap: 10px; flex-shrink: 0; background: var(--bg-card); }
        .chat-header .model-badge { font-size: 0.7rem; background: var(--bg-hover); color: var(--text-secondary); padding: 3px 10px; border-radius: 20px; font-weight: 400; }
        .chat-header .online-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--success); flex-shrink: 0; }
        .chat-messages { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 20px; background: var(--bg); }
        .chat-messages .welcome-state { text-align: center; padding: 60px 20px; margin: auto; max-width: 520px; }
        .chat-messages .welcome-state .welcome-icon { font-size: 3.5rem; margin-bottom: 16px; }
        .chat-messages .welcome-state h3 { font-size: 1.3rem; margin-bottom: 8px; color: var(--text); }
        .chat-messages .welcome-state .welcome-desc { color: var(--text-secondary); font-size: 0.9rem; line-height: 1.7; margin-bottom: 24px; }
        .chat-messages .welcome-state .suggestions { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
        .chat-messages .welcome-state .suggestion-chip { background: var(--welcome-chip-bg); border: 1px solid var(--welcome-chip-border); border-radius: 20px; padding: 8px 18px; font-size: 0.85rem; color: var(--welcome-chip-text); cursor: pointer; transition: all 0.15s; }
        .chat-messages .welcome-state .suggestion-chip:hover { border-color: #22d3ee; background: var(--welcome-chip-hover-bg); }

        .message { display: flex; gap: 10px; max-width: 78%; animation: msgIn 0.25s ease-out; }
        @keyframes msgIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .message.user { align-self: flex-end; flex-direction: row-reverse; }
        .message.assistant { align-self: flex-start; }
        .message .avatar { width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.95rem; flex-shrink: 0; }
        .message.user .avatar { background: #22d3ee; }
        .message.assistant .avatar { background: var(--bg-hover); }
        .message .bubble { padding: 12px 16px; border-radius: 16px; line-height: 1.65; font-size: 0.9rem; }
        .message.user .bubble { background: #22d3ee; color: #000; border-bottom-right-radius: 4px; }
        .message.assistant .bubble { background: var(--bg-card); border: 1px solid var(--border); border-bottom-left-radius: 4px; word-break: break-word; overflow-wrap: break-word; }
        .message .bubble p { margin: 0 0 8px; }
        .message .bubble p:last-child { margin-bottom: 0; }
        .message .bubble ul, .message .bubble ol { margin: 8px 0; padding-left: 20px; }
        .message .bubble li { margin-bottom: 4px; }
        .message .bubble code { background: var(--code-bg); padding: 2px 6px; border-radius: 4px; font-size: 0.82rem; font-family: 'Consolas', 'Courier New', monospace; }
        .message.user .bubble code { background: rgba(0,0,0,0.2); }
        .message .bubble pre { background: var(--pre-bg); border: 1px solid var(--border); border-radius: 8px; padding: 12px 16px; overflow-x: auto; margin: 8px 0; font-size: 0.82rem; line-height: 1.5; }
        .message .bubble pre code { background: none; padding: 0; }
        .message .bubble strong { color: var(--text); }
        .message.user .bubble strong { color: #000; }
        .message .bubble blockquote { border-left: 3px solid #22d3ee; padding-left: 12px; color: var(--text-secondary); margin: 8px 0; }
        .message .bubble sub, .message .bubble sup { font-size: 0.78em; }
        .message .bubble sub { vertical-align: sub; }
        .message .bubble sup { vertical-align: super; }

        .chat-input-area { padding: 14px 24px; border-top: 1px solid var(--border); display: flex; gap: 10px; align-items: flex-end; background: var(--bg-card); flex-shrink: 0; }
        .chat-input-area .input-wrapper { flex: 1; position: relative; }
        .chat-input-area textarea { width: 100%; padding: 12px 50px 12px 16px; border-radius: 16px; border: 1px solid var(--border); background: var(--bg-input); color: var(--text); font-size: 0.9rem; resize: none; outline: none; font-family: inherit; min-height: 46px; max-height: 150px; line-height: 1.5; transition: border-color 0.15s; }
        .chat-input-area textarea:focus { border-color: #22d3ee; }
        .chat-input-area .send-btn { width: 42px; height: 42px; background: #22d3ee; color: #000; border: none; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; flex-shrink: 0; transition: all 0.15s; }
        .chat-input-area .send-btn:hover { background: #06b6d4; transform: scale(1.05); }
        .chat-input-area .send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

        .scroll-down-btn { position: absolute; bottom: 80px; left: 50%; transform: translateX(-50%); width: 36px; height: 36px; background: var(--bg-hover); border: 1px solid var(--border); border-radius: 50%; color: var(--text); cursor: pointer; z-index: 10; transition: all 0.15s; }
        .scroll-down-btn:hover { background: var(--border); }
        .typing-indicator { display: flex; gap: 4px; padding: 4px 0; }
        .typing-indicator span { width: 7px; height: 7px; background: var(--text-secondary); border-radius: 50%; animation: bounce 1.4s infinite ease-in-out; }
        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }

        /* ========== 图片识别页 ========== */
        .image-page { padding: 24px; max-width: 600px; height: 100%; overflow-y: auto; }
        .image-page h3 { margin-bottom: 16px; }
        .image-page .dropzone { border: 2px dashed var(--border); border-radius: 16px; padding: 60px 20px; text-align: center; cursor: pointer; transition: all 0.2s; margin-bottom: 16px; }
        .image-page .dropzone:hover { border-color: #22d3ee; background: var(--bg-card); }
        .image-page img { max-width: 100%; max-height: 300px; border-radius: 12px; margin-bottom: 12px; }
        .image-page .result { background: var(--bg-card); border-radius: 12px; padding: 16px; margin-top: 12px; line-height: 1.6; white-space: pre-wrap; }

        /* ========== 错题本页面 ========== */
        .errorbook-page { padding: 24px; height: 100%; display: flex; flex-direction: column; }
        .errorbook-page .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .errorbook-page .header h3 { font-size: 1.2rem; }
        .errorbook-page .filters { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
        .errorbook-page .filters input, .errorbook-page .filters select { padding: 8px 12px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg-card); color: var(--text); font-size: 0.85rem; outline: none; }
        .errorbook-page .filters input:focus { border-color: #22d3ee; }
        .errorbook-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
        .eb-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 16px 20px; display: flex; gap: 16px; align-items: flex-start; transition: border-color 0.15s; box-shadow: var(--shadow); }
        .eb-card:hover { border-color: #22d3ee; }
        .eb-card .eb-img { width: 80px; height: 80px; border-radius: 8px; object-fit: cover; flex-shrink: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; color: var(--text-muted); font-size: 1.5rem; }
        .eb-card .eb-content { flex: 1; min-width: 0; }
        .eb-card .eb-question { font-weight: 600; margin-bottom: 4px; word-break: break-all; }
        .eb-card .eb-answer { color: var(--text-secondary); font-size: 0.85rem; line-height: 1.5; white-space: pre-wrap; word-break: break-all; }
        .eb-card .eb-meta { display: flex; gap: 12px; margin-top: 6px; font-size: 0.75rem; color: var(--text-muted); }
        .eb-card .eb-meta .tag { background: var(--bg-hover); padding: 2px 8px; border-radius: 4px; }
        .eb-card .eb-actions { display: flex; gap: 6px; flex-shrink: 0; }
        .empty-state { text-align: center; color: var(--text-muted); padding: 60px 0; }
        .empty-state .icon { font-size: 3rem; margin-bottom: 12px; }

        /* ========== 弹窗 Modal ========== */
        .modal-overlay { position: fixed; inset: 0; background: var(--modal-overlay); display: flex; align-items: center; justify-content: center; z-index: 100; }
        .modal { background: var(--bg-card); border: 1px solid var(--border); border-radius: 16px; padding: 28px; width: 500px; max-height: 85vh; overflow-y: auto; }
        .modal h4 { margin-bottom: 20px; font-size: 1.1rem; }
        .modal label { display: block; font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 4px; margin-top: 12px; }
        .modal input, .modal textarea, .modal select { width: 100%; padding: 10px 14px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg-input); color: var(--text); font-size: 0.9rem; outline: none; font-family: inherit; }
        .modal textarea { min-height: 80px; resize: vertical; }
        .modal input:focus, .modal textarea:focus { border-color: var(--primary); }
        .modal .img-preview { max-width: 100%; max-height: 160px; border-radius: 8px; margin-top: 8px; }
        .modal .img-upload-area { border: 1px dashed var(--border); border-radius: 8px; padding: 20px; text-align: center; cursor: pointer; margin-top: 4px; transition: all 0.15s; }
        .modal .img-upload-area:hover { border-color: var(--primary); background: var(--bg); }
        .modal .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }
        .modal .delete-img { color: var(--danger); font-size: 0.8rem; cursor: pointer; margin-top: 4px; display: inline-block; }

        /* ========== 确认弹窗 ========== */
        .confirm-overlay { position: fixed; inset: 0; background: var(--modal-overlay); display: flex; align-items: center; justify-content: center; z-index: 200; }
        .confirm-box { background: var(--bg-card); border: 1px solid var(--border); border-radius: 16px; padding: 28px; width: 360px; text-align: center; }
        .confirm-box p { margin-bottom: 20px; color: var(--text-secondary); }
        .confirm-box .actions { display: flex; gap: 10px; justify-content: center; }

        /* ========== 分析页 ========== */
        .analysis-page { padding: 24px; max-width: 900px; height: 100%; display: flex; flex-direction: column; }
        .analysis-page .top-bar { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
        .analysis-page .top-bar h3 { flex: 1; font-size: 1.2rem; }
        .analysis-page .item-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; display: flex; gap: 20px; margin-bottom: 20px; align-items: flex-start; }
        .analysis-page .item-card .item-img { width: 160px; height: 160px; border-radius: 10px; object-fit: cover; background: var(--bg); flex-shrink: 0; display: flex; align-items: center; justify-content: center; color: var(--text-muted); font-size: 3rem; }
        .analysis-page .item-card .item-info { flex: 1; min-width: 0; }
        .analysis-page .item-card .item-info .label { font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 2px; }
        .analysis-page .item-card .item-info .value { color: var(--text); margin-bottom: 12px; line-height: 1.6; white-space: pre-wrap; }
        .analysis-page .item-card .item-info .tag { display: inline-block; background: var(--bg-hover); padding: 3px 10px; border-radius: 4px; font-size: 0.8rem; color: var(--text-secondary); }
        .analysis-page .report-section { flex: 1; overflow-y: auto; }
        .analysis-page .report-section h4 { font-size: 1rem; margin-bottom: 12px; color: var(--primary); }
        .analysis-page .report-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 20px 24px; line-height: 1.8; font-size: 0.9rem; white-space: pre-wrap; }
        .analysis-page .report-card h2 { font-size: 1.1rem; margin-bottom: 8px; color: var(--text); }
        .analysis-page .report-card h3 { font-size: 1rem; margin: 12px 0 6px; color: var(--primary); }
        .analysis-page .report-card strong { color: var(--text); }
        .analysis-page .report-card code { background: var(--code-bg); padding: 2px 6px; border-radius: 4px; font-size: 0.85rem; }
        .analysis-page .report-card blockquote { border-left: 3px solid var(--primary); padding-left: 12px; color: var(--text-secondary); margin: 8px 0; }
        .analysis-page .actions-bar { display: flex; gap: 10px; padding-top: 16px; border-top: 1px solid var(--border-light); margin-top: 16px; }
        .analysis-page .empty-analysis { text-align: center; padding: 60px 20px; color: var(--text-muted); }
        .analysis-page .empty-analysis .icon { font-size: 4rem; margin-bottom: 12px; }
        .analysis-page .loading-state { text-align: center; padding: 40px; color: var(--text-secondary); }
        .spin { display: inline-block; animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* ========== 分析报告列表页 ========== */
        .analyses-list-page { padding: 24px; max-width: 900px; height: 100%; display: flex; flex-direction: column; overflow-y: auto; }
        .analyses-list-page h3 { margin-bottom: 20px; font-size: 1.2rem; }
        .analyses-list-page .analysis-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 16px 20px; display: flex; gap: 16px; align-items: flex-start; margin-bottom: 10px; cursor: pointer; transition: border-color 0.15s; }
        .analyses-list-page .analysis-card:hover { border-color: var(--primary); }
        .analyses-list-page .analysis-card .thumb { width: 64px; height: 64px; border-radius: 8px; object-fit: cover; background: var(--bg); flex-shrink: 0; display: flex; align-items: center; justify-content: center; color: var(--text-muted); font-size: 1.5rem; }
        .analyses-list-page .analysis-card .info { flex: 1; min-width: 0; }
        .analyses-list-page .analysis-card .info .title { font-weight: 600; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .analyses-list-page .analysis-card .info .preview { color: var(--text-secondary); font-size: 0.8rem; line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .analyses-list-page .analysis-card .info .meta { display: flex; gap: 12px; margin-top: 6px; font-size: 0.75rem; color: var(--text-muted); }
        .analyses-list-page .analysis-card .info .meta .tag { background: var(--bg-hover); padding: 2px 8px; border-radius: 4px; }
        /* ========== python测试页 ========== */
        .flat-label {font-size: 14px; color: var(--text); padding-left: 8px; border-left: 3px solid #1677ff; line-height: 1.2; }
        .flat-time { font-weight: 500; color: #1677ff; margin-left: 4px; }

/* ========== 紧凑型HMI组件 ========== */
    :root {--cyan: #00e5ff;--line: rgba(128, 128, 128, 0.35);}
    .dark-mode { --text-main: #e0e0e0; --text-sub: #888; }
    .compact-hmi {display: inline-flex;align-items: center;
    gap: 8px;
    padding-left: 8px;
    border-left: 2px solid var(--cyan);
    font-family: "JetBrains Mono", monospace;
    color: var(--text-main, #1a1a1a);
    }

    .compact-hmi .label {
    font-size: 10px;
    font-weight: 500;
    color: var(--text-sub, #666);
    text-transform: uppercase;
    letter-spacing: 0.5px; /* 稍微收紧 */
    }

    .compact-hmi .value {

        function renderMarkdown(text) {
            if (!text) return '';

            // 1. 保护代码块
            const blocks = [];
            let html = text
                .replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) => {
                    blocks.push('<pre><code>' + code + '</code></pre>');
                    return '___CB' + (blocks.length - 1) + '___';
                })
                .replace(/`([^`]+)`/g, (_, code) => {
                    blocks.push('<code>' + code + '</code>');
                    return '___IC' + (blocks.length - 1) + '___';
                });

            // 2. 解码 HTML 实体（AI 模型有时会转义）
            html = html.replace(/&lt;/g, '<').replace(/&gt;/g, '>').replace(/&amp;/g, '&');

            // 2.5 数学上下标（代码块已保护，安全处理）
            html = html.replace(/\^\{([^}]+)\}/g, '<sup>$1</sup>');   // x^{2} → x²
            html = html.replace(/_\{(.+?)\}/g, '<sub>$1</sub>');       // x_{1} → x₁
            html = html.replace(/\^(\d+|\+|-)/g, '<sup>$1</sup>');     // x^2  Fe^3+  Fe^2-
            html = html.replace(/_(\d+)/g, '<sub>$1</sub>');           // H_2 → H₂

            // 3. 行内格式
            html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');

            // 4. 标题、引用（行首匹配）
            html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
            html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
            html = html.replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>');

            // 5. 列表
            html = html.replace(/^- (.+)$/gm, '<li>$1</li>');
            html = html.replace(/((?:<li>.*?<\/li>\n?)+)/g, '<ul>$1</ul>');

            // 6. 段落：双换行分段，单换行转<br>
            const parts = html.split(/\n{2,}/);
            html = parts.map(p => {
                p = p.trim();
                if (!p) return '';
                if (/^<(h[23]|ul|ol|pre|blockquote|li)/.test(p)) return p;
                p = p.replace(/\n/g, '<br>');
                return '<p>' + p + '</p>';
            }).join('');

            // 7. 还原代码块
            html = html.replace(/___CB(\d+)___/g, (_, i) => blocks[+i]);
            html = html.replace(/___IC(\d+)___/g, (_, i) => blocks[+i]);

            return html;
        }

        // ==================== 全局状态 ====================

            return fetch(url, { ...options, headers });
        }

        // --- AI 对话页 ---
        const ChatPage = {
            setup() {

                const loading = ref(false);
                const showScrollBtn = ref(false);
                const localSessionId = ref(null);  // 当前会话 ID，纯本地管理

                const suggestions = [
                    '李白的诗歌都有那些特点',
                    '1+1=?',
                    '如何设计一个高效的学习计划？',
                    '用比喻的方式解释机器学习中的过拟合',
                    "物理学中，什么是热力学第二定律？"
                ];

                // ======== 工具函数 ========

                async function scrollToBottom() {
                    await nextTick();
                    const el = document.querySelector('.chat-messages');
                    if (el) el.scrollTop = el.scrollHeight;
                }

                function onScroll(e) {
                    const el = e.target;
                    showScrollBtn.value = (el.scrollHeight - el.scrollTop - el.clientHeight) > 100;
                }

                // ======== 会话管理 ========

                async function refreshSessions() {
                    try {
                        const res = await apiFetch('/api/chat/sessions');
                        const data = await res.json();
                        if (data.success) store.sessions = data.sessions;
                    } catch (e) { /* 静默 */ }
                }

                async function loadSessionById(sid) {
                    try {
                        const res = await apiFetch('/api/chat/sessions/' + sid);
                        const data = await res.json();
                        if (data.success) {
                            messages.value = data.messages;
                            localSessionId.value = sid;
                            store.currentSessionId = sid;
                            await nextTick();
                            await scrollToBottom();
                        }
                    } catch (e) { /* 静默 */ }
                }

                // ======== 核心：发送消息 ========

                async function send(msgText) {
                    if (typeof msgText !== 'string') msgText = input.value.trim();
                    if (!msgText || loading.value) return;
                    input.value = '';

                    // 1. 添加用户消息
                    messages.value.push({ role: 'user', content: msgText });
                    await scrollToBottom();

                    // 2. 请求 AI
                    loading.value = true;
                    let reply = '';
                    try {
                        const res = await fetch('/api/chat', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ message: msgText })
                        });
                        const data = await res.json();
                        reply = data.reply || '未收到回复';
                    } catch (e) {
                        reply = '❌ 请求失败，请确认后端服务已启动';
                    }
                    // 3. 添加 AI 回复
                    messages.value.push({ role: 'assistant', content: reply });
                    loading.value = false;
                    await scrollToBottom();

                    // 4. 保存到服务器
                    try {
                        const saveRes = await apiFetch('/api/chat/save', {
                            method: 'POST',
                            body: JSON.stringify({
                                session_id: localSessionId.value || 0,
                                messages: [
                                    { role: 'user', content: msgText },
                                    { role: 'assistant', content: reply }
                                ],
                                title: localSessionId.value ? null : msgText.substring(0, 30)
                            })
                        });
                        const saveData = await saveRes.json();
                        if (saveData.success && saveData.session_id) {
                            if (!localSessionId.value) {
                                localSessionId.value = saveData.session_id;
                                store.currentSessionId = saveData.session_id;
                            }
                            await refreshSessions();
                        }
                    } catch (e) { /* 保存失败不影响对话 */ }

                    let text = `# AI 对话记录\n\n**导出时间**：${now}\n\n---\n\n`;

                        text += `### ${m.role === 'user' ? '👤 用户' : '🤖 AI助教'}\n\n${m.content}\n\n---\n\n`;
                    });
                    const blob = new Blob([text], { type: 'text/markdown;charset=utf-8' });
                    const a = document.createElement('a');
                    a.href = URL.createObjectURL(blob);
                    a.download = `AI对话_${now.replace(/:/g, '')}.md`;
                    a.click();
                    URL.revokeObjectURL(a.href);
                }

                function handleKeydown(e) {
                    if (e.key === 'Enter' && !e.shiftKey) {
                        e.preventDefault();
                        send();
                    }
                }

                // ======== 初始化 ========

                // 监听侧边栏会话切换
                watch(() => store.currentSessionId, async (newId) => {
                    if (newId && newId !== localSessionId.value) {
                        await loadSessionById(newId);

                        return;

                    // 否则加载最近一条
                    if (store.sessions.length > 0) {
                        const last = store.sessions[0];
                        await loadSessionById(last.id);
                    }
                });

                return {
                    input, messages, loading, showScrollBtn, suggestions, localSessionId,
                    send, newChat, exportChat, scrollToBottom, onScroll, renderMarkdown, handleKeydown

            },

                        </div>

                    </div>
                </div>
            `
        };

        // --- 图片识别页 ---
        const ImagePage = {
            setup() {
                const imageSrc = ref(null);
                const result = ref('');
                const loading = ref(false);

                function handleFile(e) {
                    const file = e.target.files[0];
                    if (!file) return;
                    const reader = new FileReader();
                    reader.onload = async (ev) => {
                        imageSrc.value = ev.target.result;
                        const base64 = ev.target.result.split(',')[1];
                        loading.value = true; result.value = '';
                        try {
                            const res = await fetch('/api/image-recognize', {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({ image_base64: base64 })
                            });
                            const data = await res.json();
                            result.value = data.reply || '未收到结果';
                        } catch (e) {
                            result.value = '❌ 请求失败';
                        } finally { loading.value = false; }
                    };
                    reader.readAsDataURL(file);
                }

                return { imageSrc, result, loading, handleFile };
            },
            template: `
                <div class="image-page">
                    <h3>🖼️ AI 图片识别</h3>
                    <div class="dropzone" @click="$refs.fileInput.click()">
                        <div style="font-size:2.5rem;margin-bottom:8px;">📤</div>
                        <p>点击上传图片</p><p style="color:#64748b;font-size:0.8rem;">支持 JPG / PNG / GIF</p>
                        <input ref="fileInput" type="file" accept="image/*" @change="handleFile" style="display:none" />
                    </div>
                    <img v-if="imageSrc" :src="imageSrc" alt="上传的图片" />
                    <div v-if="loading" style="color:#94a3b8;text-align:center;">⏳ 正在分析...</div>
                    <div v-if="result" class="result">{{ result }}</div>
                </div>
            `
        };

        // --- 错题本页 ---
        const ErrorbookPage = {
            setup() {
                const items = ref([]);
                const loading = ref(false);
                const keyword = ref('');
                const filterSubject = ref('');

                // 弹窗状态
                const showModal = ref(false);
                const isEditing = ref(false);
                const editId = ref(null);
                const form = reactive({ question: '', answer: '', subject: '', imageBase64: '', imageSrc: '' });

                // 删除确认
                const showConfirm = ref(false);
                const deleteId = ref(null);

                // 加载列表
                async function loadItems() {
                    try {
                        const res = await apiFetch('/api/errorbook');
                        const data = await res.json();
                        if (res.status === 401) { clearLogin(); return; }
                        if (data.success) items.value = data.items;
                    } catch (e) { console.error(e); }
                }

                // 搜索/筛选
                const filteredItems = Vue.computed(() => {
                    let list = items.value;
                    if (keyword.value) {
                        const kw = keyword.value.toLowerCase();
                        list = list.filter(i =>
                            (i.question || '').toLowerCase().includes(kw) ||
                            (i.answer || '').toLowerCase().includes(kw)
                        );
                    }
                    if (filterSubject.value) {
                        list = list.filter(i => i.subject === filterSubject.value);
                    }
                    return list;
                });

                // 所有科目（用于筛选下拉）
                const subjects = Vue.computed(() => {
                    const s = new Set(items.value.map(i => i.subject).filter(Boolean));
                    return [...s];
                });

                // 打开添加弹窗
                function openAdd() {
                    isEditing.value = false;
                    editId.value = null;
                    form.question = ''; form.answer = ''; form.subject = '';
                    form.imageBase64 = ''; form.imageSrc = '';
                    showModal.value = true;
                }

                // 打开编辑弹窗
                function openEdit(item) {
                    isEditing.value = true;
                    editId.value = item.id;
                    form.question = item.question;
                    form.answer = item.answer || '';
                    form.subject = item.subject || '';
                    form.imageSrc = item.image_url || '';
                    form.imageBase64 = '';
                    showModal.value = true;
                }

                // 图片选择
                function handleImage(e) {
                    const file = e.target.files[0];
                    if (!file) return;
                    const reader = new FileReader();
                    reader.onload = (ev) => {
                        form.imageSrc = ev.target.result;
                        form.imageBase64 = ev.target.result.split(',')[1];
                    };
                    reader.readAsDataURL(file);
                }

                function removeImage() {
                    form.imageSrc = '';
                    form.imageBase64 = '__DELETE__';
                }

                // 保存（添加或编辑）
                async function saveItem() {
                    if (!form.question.trim()) return;
                    const body = {
                        question: form.question,
                        answer: form.answer,
                        subject: form.subject,
                        image_base64: form.imageBase64 || null
                    };

                    if (isEditing.value) {
                        // 如果是删除图片
                        if (form.imageBase64 === '__DELETE__') {
                            body.keep_image = false;
                            body.image_base64 = null;
                        } else if (!form.imageBase64 && form.imageSrc) {
                            // 没改图片，保持原样
                            body.image_base64 = null;
                            body.keep_image = true;
                        }
                        await apiFetch(`/api/errorbook/${editId.value}`, {
                            method: 'PUT', body: JSON.stringify(body)
                        });
                    } else {
                        await apiFetch('/api/errorbook', {
                            method: 'POST', body: JSON.stringify(body)
                        });
                    }
                    showModal.value = false;
                    await loadItems();
                }

                // 确认删除
                function confirmDelete(id) {
                    deleteId.value = id;
                    showConfirm.value = true;
                }

                async function doDelete() {
                    await apiFetch(`/api/errorbook/${deleteId.value}`, { method: 'DELETE' });
                    showConfirm.value = false;
                    await loadItems();
                }

                // 格式化时间
                function fmtTime(t) {
                    if (!t) return '';
                    return t.replace('T', ' ').substring(0, 16);
                }

                // ──── AI 分析 ────
                const analyzingId = ref(null);
                const router = useRouter();

                async function startAnalysis(itemId) {
                    analyzingId.value = itemId;
                    try {
                        const res = await apiFetch(`/api/errorbook/${itemId}/analyze`, { method: 'POST' });
                        const data = await res.json();
                        if (data.success) {
                            router.push(`/analysis/${itemId}`);
                        } else {
                            alert(data.error || '分析失败');
                        }
                    } catch (e) {
                        alert('请求失败，请确认后端已启动');
                    } finally {
                        analyzingId.value = null;
                    }
                }

                onMounted(loadItems);
                return {
                    items, filteredItems, keyword, filterSubject, subjects,
                    showModal, isEditing, form, openAdd, openEdit, saveItem,
                    handleImage, removeImage,
                    showConfirm, confirmDelete, doDelete,
                    fmtTime, loading,
                    analyzingId, startAnalysis
                };
            },
            template: `
                <div class="errorbook-page">
                    <div class="header">
                        <h3>📝 我的错题本</h3>
                        <button class="btn btn-primary" @click="openAdd">+ 添加错题</button>
                    </div>

                    <!-- 搜索筛选 -->
                    <div class="filters">
                        <input v-model="keyword" placeholder="🔍 搜索题目或答案..." style="flex:1;max-width:300px;" />
                        <select v-model="filterSubject">
                            <option value="">全部科目</option>
                            <option v-for="s in subjects" :value="s">{{ s }}</option>
                        </select>
                        <span style="color:#64748b;font-size:0.8rem;display:flex;align-items:center;">
                            共 {{ filteredItems.length }} 条
                        </span>
                    </div>

                    <!-- 列表 -->
                    <div class="errorbook-list">
                        <div v-if="filteredItems.length===0" class="empty-state">
                            <div class="icon">📭</div>
                            <p v-if="items.length===0">还没有错题，点击右上角「添加错题」开始记录</p>
                            <p v-else>没有匹配的错题</p>
                        </div>
                        <div v-for="item in filteredItems" :key="item.id" class="eb-card">
                            <img v-if="item.image_url" :src="item.image_url" class="eb-img" />
                            <div v-else class="eb-img">📝</div>
                            <div class="eb-content">
                                <div class="eb-question">{{ item.question }}</div>
                                <div class="eb-answer" v-if="item.answer">{{ item.answer }}</div>
                                <div class="eb-meta">
                                    <span v-if="item.subject" class="tag">{{ item.subject }}</span>
                                    <span>{{ fmtTime(item.updated_at) }}</span>
                                </div>
                            </div>
                            <div class="eb-actions">
                                <button class="btn btn-outline btn-sm" @click="startAnalysis(item.id)" :disabled="analyzingId===item.id">
                                    {{ analyzingId===item.id ? '⏳ 分析中...' : '🤖 AI分析' }}
                                </button>
                                <button class="btn btn-outline btn-sm" @click="openEdit(item)">编辑</button>
                                <button class="btn btn-danger btn-sm" @click="confirmDelete(item.id)">删除</button>
                            </div>
                        </div>
                    </div>

                    <!-- 添加/编辑弹窗 -->
                    <div v-if="showModal" class="modal-overlay" @click.self="showModal=false">
                        <div class="modal">
                            <h4>{{ isEditing ? '编辑错题' : '添加错题' }}</h4>
                            <label>题目内容 *</label>
                            <input v-model="form.question" placeholder="输入题目内容" />

                            <label>正确答案 / 笔记</label>
                            <textarea v-model="form.answer" placeholder="记录正确答案或解题笔记..."></textarea>

                            <label>科目标签</label>
                            <input v-model="form.subject" placeholder="如：数学、英语、物理..." />

                            <label>配图</label>
                            <div class="img-upload-area" @click="$refs.ebFileInput.click()" v-if="!form.imageSrc">
                                📷 点击上传图片
                            </div>
                            <input ref="ebFileInput" type="file" accept="image/*" @change="handleImage" style="display:none" />
                            <img v-if="form.imageSrc" :src="form.imageSrc" class="img-preview" />
                            <span v-if="form.imageSrc" class="delete-img" @click="removeImage">🗑 删除图片</span>

                            <div class="modal-actions">
                                <button class="btn btn-outline" @click="showModal=false">取消</button>
                                <button class="btn btn-primary" @click="saveItem">{{ isEditing ? '保存' : '添加' }}</button>
                            </div>
                        </div>
                    </div>

                    <!-- 删除确认弹窗 -->
                    <div v-if="showConfirm" class="confirm-overlay" @click.self="showConfirm=false">
                        <div class="confirm-box">
                            <p>确定要删除这条错题吗？此操作不可撤销。</p>
                            <div class="actions">
                                <button class="btn btn-outline" @click="showConfirm=false">取消</button>
                                <button class="btn btn-danger" @click="doDelete">确认删除</button>
                            </div>
                        </div>
                    </div>
                </div>
            `
        };

        // --- 错题 AI 分析页 ---
        const AnalysisPage = {
            setup() {
                const route = useRoute();
                const router = useRouter();
                const item = ref(null);       // 错题数据
                const analysis = ref(null);   // 分析结果 {id, text, created_at}
                const loading = ref(true);
                const analyzing = ref(false);
                const error = ref('');

                // ── 加载分析数据 ──
                async function loadAnalysis() {
                    loading.value = true;
                    error.value = '';
                    try {
                        const res = await apiFetch('/api/errorbook/' + route.params.id + '/analysis');
                        if (res.status === 401) { clearLogin(); router.push('/login'); return; }
                        if (res.status === 404) { error.value = '错题不存在'; return; }
                        const data = await res.json();
                        if (data.success) { item.value = data.item; analysis.value = data.analysis; }
                        else { error.value = data.error || '加载失败'; }
                    } catch (e) { error.value = '网络错误'; }
                    finally { loading.value = false; }
                }

                // ── 触发 AI 分析 ──
                async function triggerAnalysis() {
                    analyzing.value = true;
                    try {
                        const res = await apiFetch('/api/errorbook/' + route.params.id + '/analyze', { method: 'POST' });
                        const data = await res.json();
                        if (data.success) analysis.value = data.analysis;
                        else alert(data.error || '分析失败');
                    } catch (e) { alert('请求失败'); }
                    finally { analyzing.value = false; }
                }

                // ── 删除分析 ──
                async function removeAnalysis() {
                    if (!confirm('确定删除？')) return;
                    await apiFetch('/api/errorbook/' + route.params.id + '/analysis', { method: 'DELETE' });
                    analysis.value = null;
                }

                // ── 导出 Markdown ──
                function exportReport() {
                    if (!analysis.value) { alert('无内容可导出'); return; }
                    const text = `# AI 错题分析\n\n**题目**：${item.value.question}\n\n---\n\n${analysis.value.text}`;
                    const a = document.createElement('a');
                    a.href = URL.createObjectURL(new Blob([text],{type:'text/markdown'}));
                    a.download = '错题分析.md';
                    a.click();
                }

                // ── 在此区域添加你自己的文本渲染函数 ──
                // function customRender(text) {
                //     // 例如：text.replace(/\n/g, '<br>').replace(/`([^`]+)`/g, '<code>$1</code>');
                //     return text;
                // }

                onMounted(loadAnalysis);
                return { item, analysis, loading, analyzing, error, triggerAnalysis, removeAnalysis, exportReport };
            },
            template: `
                <div class="analysis-page">
                    <div class="top-bar">
                        <button class="btn btn-outline btn-sm" @click="$router.push('/errorbook')">← 返回</button>
                        <h3>📊 AI 错题分析</h3>
                    </div>
                    <div v-if="loading" style="text-align:center;padding:60px;color:#94a3b8;">加载中...</div>
                    <div v-else-if="error" style="text-align:center;padding:60px;color:#f87171;">{{ error }}</div>
                    <template v-else-if="item">
                        <!-- 错题信息 -->
                        <div class="item-card">
                            <img v-if="item.image_url" :src="item.image_url" class="item-img" />
                            <div v-else class="item-img">📝</div>
                            <div class="item-info">
                                <div class="label">题目</div>
                                <div class="value">{{ item.question }}</div>
                                <div class="label">答案</div>
                                <div class="value">{{ item.answer || '（无）' }}</div>
                                <span v-if="item.subject" class="tag">{{ item.subject }}</span>
                            </div>
                        </div>

                        <!-- 分析报告：纯文本显示，行高留白便于阅读，日后可自己替换渲染方式 -->
                        <div class="report-section">
                            <h4>🤖 AI 分析报告</h4>
                            <div v-if="analysis" class="report-card" style="white-space:pre-wrap;word-break:break-word;font-size:0.95rem;">
                                {{ analysis.text }}
                            </div>
                            <div v-else class="empty-analysis">
                                <div class="icon">🔍</div>
                                <p>尚未分析</p>
                            </div>
                        </div>

                        <!-- 操作 -->
                        <div class="actions-bar">
                            <button class="btn btn-primary" @click="triggerAnalysis" :disabled="analyzing">
                                {{ analyzing ? '分析中...' : (analysis ? '重新分析' : '开始分析') }}
                            </button>
                            <button v-if="analysis" class="btn btn-outline btn-sm" @click="exportReport">导出</button>
                            <button v-if="analysis" class="btn btn-danger btn-sm" @click="removeAnalysis">删除</button>
                        </div>
                    </template>
                </div>
            `
        };

        // --- 分析报告列表页 ---
        const AnalysisListPage = {
            setup() {
                const router = useRouter();
                const items = ref([]);
                const loading = ref(true);

                async function loadAnalyses() {
                    loading.value = true;
                    try {
                        const res = await apiFetch('/api/analyses');
                        if (res.status === 401) { clearLogin(); router.push('/login'); return; }
                        const data = await res.json();
                        if (data.success) items.value = data.items;
                    } catch (e) { /* 静默 */ }
                    finally { loading.value = false; }
                }

                function goDetail(errorbookId) {
                    router.push(`/analysis/${errorbookId}`);
                }

                function fmtTime(t) {
                    if (!t) return '';
                    return t.replace('T', ' ').substring(0, 16);
                }

                function previewText(text) {
                    if (!text) return '';
                    // 取前 80 个字符做摘要，跳过 Markdown 标记
                    return text.replace(/[#*>`]/g, '').substring(0, 80) + (text.length > 80 ? '...' : '');
                }

                onMounted(loadAnalyses);
                return { items, loading, goDetail, fmtTime, previewText };
            },
            template: `
                <div class="analyses-list-page">
                    <h3>📊 分析报告列表</h3>
                    <div v-if="loading" style="text-align:center;padding:60px;color:#94a3b8;">
                        <span class="spin">⏳</span> 加载中...
                    </div>
                    <div v-else-if="items.length===0" style="text-align:center;padding:60px;color:#64748b;">
                        <div style="font-size:3rem;margin-bottom:12px;">📭</div>
                        <p>暂无分析报告</p>
                        <p style="font-size:0.85rem;margin-top:4px;">在错题本中点击「🤖 AI分析」即可生成报告</p>
                    </div>
                    <div v-else v-for="item in items" :key="item.id" class="analysis-card" @click="goDetail(item.errorbook_id)">
                        <div class="thumb">
                            <img v-if="item.image_url" :src="item.image_url" style="width:100%;height:100%;object-fit:cover;border-radius:8px;" />
                            <span v-else>📝</span>
                        </div>
                        <div class="info">
                            <div class="title">{{ item.question || '（无题目）' }}</div>
                            <div class="preview">{{ previewText(item.analysis_text) }}</div>
                            <div class="meta">
                                <span v-if="item.subject" class="tag">{{ item.subject }}</span>
                                <span>{{ fmtTime(item.created_at) }}</span>
                            </div>
                        </div>
                    </div>
                </div>
            `
        };


        // --- 关于页 --
        const AboutPage = {
            template: `
            <div id="site-about" style="padding:28px;">
                    <header>
                        <h1>[校园人工智能助手/SAA]</h1>
                        <p>独立开发项目</p>
                    </header>

                    <main>

                        <section>
                            <h2>技术栈</h2>
                            <ul>
                                <li>前端：Vue 3</li>
                                <li>后端：Python / FastAPI</li>
                                <li>数据库：SQLite</li>
                                <li>其他：Git / OpenAI </li>
                            </ul>
                        </section>

                        <section>
                            <h2>真-关于项目</h2>
                            <ul>
                                <li>本项目为个人独立开发，旨在提供一个校园人工智能助手,帮助学生更好地学习和管理错题。</li>
                                <li>项目使用了AI接口,先暂定使用deepseek,千问的qwen-vl-max用于智能问答和错题分析。</li>
                                <li>本人菜,所以前端采用Vue框架,后端使用FastAPI。</li>
                                <li>项目仍在持续开发中，欢迎大家提出建议和反馈!</li>
                            </ul>
                        </section>
                        <section>
                            <h2>项目地址</h2>
                            <p>GitHub: <a href="https://github.com/zincumyu/SAA">SAA</a></p>                            
                            

                        </section>
                    </main>
            </div>
            `
        };

        // ==================== 路由 ====================
        const routes = [
            { path: '/', component: WelcomePage },
            { path: '/login', component: AuthPage },
            {
                path: '/',
                component: MainLayout,
                children: [
                    { path: '/chat', component: ChatPage },
                    { path: '/image', component: ImagePage },
                    { path: '/errorbook', component: ErrorbookPage },
                    { path: '/analyses', component: AnalysisListPage },
                    { path: '/analysis/:id', component: AnalysisPage },
                    { path: '/pytest', component: Pytest },
                    { path: '/about', component: AboutPage }
                ]
            },
        ];

        const router = createRouter({
            history: createWebHashHistory(),
            routes,
        });

        // ==================== 导航守卫：未登录拦截 ====================
        const protectedRoutes = ['/chat', '/image', '/errorbook', '/analyses', '/knowledge','/pytest'];
        router.beforeEach((to, from) => {
            const needsAuth = protectedRoutes.includes(to.path) || to.path.startsWith('/analysis/');
            if (needsAuth && !store.isLoggedIn()) {
                return '/login';
            }
        });

        // ==================== 启动 ====================
        const app = createApp({});
        app.use(router);
        app.mount('#app');
    </script>

</body>
</html>
