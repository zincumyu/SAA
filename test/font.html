<style>
    /* ========== 全局 ========== */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', 'PingFang SC', sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; }
    .btn { padding: 10px 24px; border: none; border-radius: 8px; font-size: 0.9rem; cursor: pointer; font-weight: 600; transition: all 0.15s; }
    .btn-primary { background: #6366f1; color: white; }
    .btn-primary:hover { background: #4f46e5; }
    .btn-danger { background: #ef4444; color: white; }
    .btn-danger:hover { background: #dc2626; }
    .btn-outline { background: transparent; color: #94a3b8; border: 1px solid #475569; }
    .btn-outline:hover { border-color: #6366f1; color: #e2e8f0; }
    .btn-sm { padding: 6px 14px; font-size: 0.8rem; }
</style>
<h3 class="btn">测试文本</h3>
<h3 class="btn-primary">测试文本</h3>

<style>
:root {
  --bg-light: #ffffff;
  --bg-dark: #1a1a1a;
  --text-light: #1a1a1a;
  --text-dark: #e0e0e0;
  --accent: #00e5ff; /* 工业青/赛博青 */
}

.hmi-panel {
  /* 模拟环境切换 */
  background: var(--bg-light);
  color: var(--text-light);
  padding: 20px;
  font-family: "JetBrains Mono", "Fira Code", Consolas, monospace;
}

/* 深色模式切换（实际项目中由 JS 或系统偏好控制） */
.hmi-panel.dark {
  background: var(--bg-dark);
  color: var(--text-dark);
}

.hmi-time {
  display: flex;
  align-items: center;
  gap: 12px;
  font-size: 14px;
  letter-spacing: 0.5px;
}

.hmi-time .prefix {
  color: #888;
  text-transform: uppercase;
  font-size: 11px;
}

/* 核心数据高亮 */
.hmi-time .value {
  color: var(--accent);
  font-weight: 700;
  font-size: 18px;
  text-shadow: 0 0 8px rgba(0, 229, 255, 0.6); /* 微弱发光，增加科技感 */
}

/* 状态指示灯 */
.status-dot {
  width: 8px;
  height: 8px;
  background: #4caf50; /* 绿色正常 */
  border-radius: 50%;
  box-shadow: 0 0 6px #4caf50;
  animation: pulse 2s infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}
</style>

<!-- 浅色背景 -->
<div class="hmi-panel">
  <div class="hmi-time">
    <span class="status-dot"></span>
    <span class="prefix">时间测试输入</span>
    <span class="value">2025-06-12 14:30:26</span>
  </div>
</div>

<!-- 深色背景 -->
<div class="hmi-panel dark" style="margin-top: 20px;">
  <div class="hmi-time">
    <span class="status-dot"></span>
    <span class="prefix">时间测试输入</span>
    <span class="value">2025-06-12 14:30:26</span>
  </div>
</div>
/* ========== 紧凑型HMI组件 ========== */
<style>
:root {--cyan: #00e5ff;--line: rgba(128, 128, 128, 0.35);}
.dark-mode { --text-main: #e0e0e0; --text-sub: #888; }
.compact-hmi {display: inline-flex;align-items: center;
  gap: 8px;
  padding-left: 8px;
  border-left: 2px solid var(--cyan);
  font-family: "JetBrains Mono", monospace;
  color: var(--text-main, #1a1a1a);
}

.compact-hmi .label {
  font-size: 10px;
  font-weight: 500;
  color: var(--text-sub, #666);
  text-transform: uppercase;
  letter-spacing: 0.5px; /* 稍微收紧 */
}

.compact-hmi .value {
  font-size: 15px; /* 稍微缩小一号 */
  font-weight: 600;
  color: var(--cyan);
  text-shadow: 0 0 5px rgba(0, 229, 255, 0.5);
}

/* 微型LED */
.led-mini {
  width: 5px;
  height: 5px;
  background: #4caf50;
  border-radius: 50%;
  box-shadow: 0 0 6px #4caf50;
  animation: pulse 2s infinite;
}
</style>

<!-- 深色 -->
<div>
  <div class="compact-hmi">
    <span class="led-mini"></span>
    <span class="label">T</span>
    <span class="value">2025-06-12 14:30</span>
  </div>
</div>
